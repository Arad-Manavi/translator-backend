<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Translator"/>
  <meta name="theme-color" content="#1a1f2e"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>Translator</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1f2e;
      --panel:     #1e2436;
      --divider:   #2e3650;
      --a-color:   #4fc3f7;
      --b-color:   #81c995;
      --text-main: #e8eaed;
      --text-dim:  #9aa0b4;
      --text-hint: #5f6780;
      --mic-a:     #4285f4;
      --mic-b:     #34a853;
      --mic-size:  76px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'Roboto', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      user-select: none;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── Each half panel ──────────────────────────── */
    .half {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: relative;
      min-height: 0;
    }

    .half.top {
      padding-top: max(16px, env(safe-area-inset-top));
      padding-bottom: 16px;
    }
    .half.bottom {
      padding-top: 16px;
      padding-bottom: 8px;
    }

    /* Lang bar */
    .lang-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      padding: 10px 0 4px;
    }

    .lang-select-wrap {
      display: flex;
      align-items: center;
      gap: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 6px 12px 6px 14px;
      cursor: pointer;
    }
    .lang-select-wrap select {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: 15px;
      font-weight: 700;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
      max-width: 140px;
    }
    .half.top .lang-select-wrap select { color: var(--b-color); }
    .half.bottom .lang-select-wrap select { color: var(--a-color); }
    .chevron { font-size: 10px; color: var(--text-dim); pointer-events: none; margin-left: 2px; }
    .panel-icons {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .icon-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 19px;
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.12s;
    }
    .icon-btn:active { background: rgba(255,255,255,0.1); }

    /* Text area */
    .text-zone {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 0;
      min-height: 0;
      cursor: text;
    }

    .text-zone textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Google Sans', 'Roboto', sans-serif;
      font-size: 28px;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text-main);
      resize: none;
      text-align: center;
      display: flex;
      align-items: center;
      -webkit-overflow-scrolling: touch;
      caret-color: var(--a-color);
    }
    .half.top .text-zone textarea { caret-color: var(--b-color); }

    .text-zone textarea::placeholder {
      color: var(--text-hint);
      font-size: 22px;
    }

    /* Translating indicator */
    .status-dots {
      display: none;
      gap: 5px;
      align-items: center;
      justify-content: center;
      padding: 8px 0;
    }
    .status-dots.visible { display: flex; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      animation: bounce 1.2s ease infinite;
    }
    .half.bottom .dot { background: var(--a-color); }
    .half.top    .dot { background: var(--b-color); }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
      40%          { transform: scale(1);   opacity: 1; }
    }

    /* Mic bottom bar */
    #mic-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 14px 0 max(18px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--divider);
    }

    .mic-btn {
      width: var(--mic-size);
      height: var(--mic-size);
      border-radius: 50%;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      cursor: pointer;
      position: relative;
      transition: transform 0.12s;
      flex-shrink: 0;
    }
    #mic-a { background: var(--mic-a); box-shadow: 0 4px 20px rgba(66,133,244,0.4); margin-right: 28px; }
    #mic-b { background: var(--mic-b); box-shadow: 0 4px 20px rgba(52,168,83,0.4);  margin-left: 28px; }

    .mic-btn:active { transform: scale(0.9); }
    .mic-btn:disabled { opacity: 0.35; transform: none; cursor: default; box-shadow: none; }
    .mic-btn svg { width: 28px; height: 28px; fill: white; flex-shrink: 0; }

    .mic-btn::before {
      content: "";
      position: absolute;
      width: 100%; height: 100%;
      border-radius: 50%;
      opacity: 0;
    }
    .mic-btn.listening { transform: scale(1.06); }
    .mic-btn.listening::before { animation: ripple 1.1s ease-out infinite; }
    #mic-a.listening::before { background: var(--mic-a); }
    #mic-b.listening::before { background: var(--mic-b); }
    #mic-a.listening { box-shadow: 0 4px 20px rgba(66,133,244,0.6); }
    #mic-b.listening { box-shadow: 0 4px 20px rgba(52,168,83,0.6); }

    .mic-sep {
      width: 1px;
      height: 40px;
      background: var(--divider);
      flex-shrink: 0;
    }
    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.5; }
      100% { transform: scale(1.7); opacity: 0; }
    }

    .mic-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* ── Divider ──────────────────────────────────── */
    .divider {
      flex-shrink: 0;
      height: 1px;
      background: var(--divider);
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .divider-pill {
      position: absolute;
      background: var(--bg);
      border: 1px solid var(--divider);
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 0;
      overflow: hidden;
    }

    .dp-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 16px;
      width: 40px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      font-family: 'Roboto', sans-serif;
    }
    .dp-btn:active { background: rgba(255,255,255,0.08); }
    .dp-sep { width: 1px; height: 18px; background: var(--divider); }

    .auto-indicator {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0 10px;
      color: var(--mic-a);
      white-space: nowrap;
    }
    .auto-indicator.off { color: var(--text-hint); }

    /* ── Voice help ───────────────────────────────── */
    #voice-help {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #2d3144;
      border-top: 1px solid var(--divider);
      padding: 14px 18px max(14px, env(safe-area-inset-bottom));
      font-size: 13px;
      line-height: 1.6;
      color: #ffd54f;
      z-index: 100;
    }
    #voice-help strong { display: block; margin-bottom: 4px; }
    #voice-help-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; color: var(--text-dim);
      font-size: 20px; cursor: pointer;
    }

    /* ── Install hint ─────────────────────────────── */
    #install-hint {
      position: fixed;
      bottom: max(8px, env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%);
      font-size: 11px; color: var(--text-hint);
      white-space: nowrap; pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- TOP HALF (person B — rotated so they can read it) -->
  <div class="half top" id="half-b">
    <div class="lang-bar">
      <div class="lang-select-wrap">
        <select id="lang-b" aria-label="Language B">
          <option value="fa">Persian</option>
          <option value="en">English</option>
          <option value="ar">Arabic</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="zh-CN">Chinese</option>
          <option value="ru">Russian</option>
          <option value="tr">Turkish</option>
          <option value="ur">Urdu</option>
          <option value="hi">Hindi</option>
        </select>
        <span class="chevron">▾</span>
      </div>
      <div class="panel-icons">
        <button class="icon-btn" id="speak-b" title="Speak">🔊</button>
        <button class="icon-btn" id="clear-b" title="Clear">✕</button>
      </div>
    </div>

    <div class="text-zone">
      <textarea id="text-b" placeholder="Tap to type…" spellcheck="false"></textarea>
    </div>

    <div class="status-dots" id="dots-b">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

  </div>

  <!-- DIVIDER -->
  <div class="divider">
    <div class="divider-pill">
      <button class="dp-btn" id="swap-btn" title="Swap languages">⇄</button>
      <div class="dp-sep"></div>
      <span class="auto-indicator" id="auto-indicator">AUTO</span>
      <div class="dp-sep"></div>
      <button class="dp-btn" id="auto-btn" title="Toggle auto-speak">🔊</button>
    </div>
  </div>

  <!-- BOTTOM HALF (person A) -->
  <div class="half bottom" id="half-a">
    <div class="lang-bar">
      <div class="lang-select-wrap">
        <select id="lang-a" aria-label="Language A">
          <option value="en">English</option>
          <option value="fa">Persian</option>
          <option value="ar">Arabic</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="zh-CN">Chinese</option>
          <option value="ru">Russian</option>
          <option value="tr">Turkish</option>
          <option value="ur">Urdu</option>
          <option value="hi">Hindi</option>
        </select>
        <span class="chevron">▾</span>
      </div>
      <div class="panel-icons">
        <button class="icon-btn" id="speak-a" title="Speak">🔊</button>
        <button class="icon-btn" id="clear-a" title="Clear">✕</button>
      </div>
    </div>

    <div class="text-zone">
      <textarea id="text-a" placeholder="Tap to type…" spellcheck="false"></textarea>
    </div>

    <div class="status-dots" id="dots-a">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

  </div>

</div>

<!-- Shared mic bar -->
<div id="mic-bar">
  <button class="mic-btn" id="mic-a" aria-label="Speak in language A">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    <span class="mic-label" id="mic-a-label">English</span>
  </button>
  <div class="mic-sep"></div>
  <button class="mic-btn" id="mic-b" aria-label="Speak in language B">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    <span class="mic-label" id="mic-b-label">Persian</span>
  </button>
</div>

<!-- Voice help toast -->
<div id="voice-help">
  <button id="voice-help-close">×</button>
  <strong>⚠ Voice not installed for this language</strong>
  Windows: Start → Settings → Time &amp; Language → Speech → Add voices → search the language → Add, then restart Chrome.<br>
  iPhone: Settings → Accessibility → Spoken Content → Voices → find the language → download Enhanced voice.
</div>

<p id="install-hint"></p>

<script>
  const BACKEND_URL = "https://translator-backend-mgzd.onrender.com";

  const RTL = new Set(["fa","ar","ur"]);
  const TTS_LOCALE = { en:"en-US",fa:"fa-IR",ar:"ar-SA",fr:"fr-FR",es:"es-ES",de:"de-DE","zh-CN":"zh-CN",ru:"ru-RU",tr:"tr-TR",ur:"ur-PK",hi:"hi-IN" };
  const LANG_NAMES = { en:"English",fa:"Persian",ar:"Arabic",fr:"French",es:"Spanish",de:"German","zh-CN":"Chinese",ru:"Russian",tr:"Turkish",ur:"Urdu",hi:"Hindi" };

  const langA      = document.getElementById("lang-a");
  const langB      = document.getElementById("lang-b");
  const textA      = document.getElementById("text-a");
  const textB      = document.getElementById("text-b");
  const micABtn    = document.getElementById("mic-a");
  const micBBtn    = document.getElementById("mic-b");
  const micALabel  = document.getElementById("mic-a-label");
  const micBLabel  = document.getElementById("mic-b-label");
  const speakABtn  = document.getElementById("speak-a");
  const speakBBtn  = document.getElementById("speak-b");
  const clearABtn  = document.getElementById("clear-a");
  const clearBBtn  = document.getElementById("clear-b");
  const swapBtn    = document.getElementById("swap-btn");
  const autoBtn    = document.getElementById("auto-btn");
  const autoInd    = document.getElementById("auto-indicator");
  const dotsA      = document.getElementById("dots-a");
  const dotsB      = document.getElementById("dots-b");
  const voiceHelp  = document.getElementById("voice-help");

  let autoSpeak  = true;
  let activeSide = null;
  let recognition = null;
  let typingTimer = null;

  // ── Labels & directions ───────────────────────────────────────────
  function updateLabels() {
    micALabel.textContent = LANG_NAMES[langA.value] || langA.value;
    micBLabel.textContent = LANG_NAMES[langB.value] || langB.value;
    textA.dir = RTL.has(langA.value) ? "rtl" : "ltr";
    textB.dir = RTL.has(langB.value) ? "rtl" : "ltr";
  }
  langA.addEventListener("change", () => { updateLabels(); if (textA.value.trim()) triggerTranslate("a"); });
  langB.addEventListener("change", () => { updateLabels(); if (textB.value.trim()) triggerTranslate("b"); });
  updateLabels();

  // ── Auto-speak toggle ─────────────────────────────────────────────
  autoBtn.addEventListener("click", () => {
    autoSpeak = !autoSpeak;
    autoInd.textContent  = autoSpeak ? "AUTO" : "OFF";
    autoInd.className    = "auto-indicator" + (autoSpeak ? "" : " off");
    autoBtn.textContent  = autoSpeak ? "🔊" : "🔇";
  });

  // ── Swap ──────────────────────────────────────────────────────────
  swapBtn.addEventListener("click", () => {
    const tl = langA.value; langA.value = langB.value; langB.value = tl;
    const tt = textA.value; textA.value = textB.value; textB.value = tt;
    updateLabels();
  });

  // ── Clear ─────────────────────────────────────────────────────────
  clearABtn.addEventListener("click", () => { textA.value = ""; textB.value = ""; });
  clearBBtn.addEventListener("click", () => { textB.value = ""; textA.value = ""; });

  // ── Translation ───────────────────────────────────────────────────
  async function triggerTranslate(sourceSide) {
    const fromLang = sourceSide === "a" ? langA.value : langB.value;
    const toLang   = sourceSide === "a" ? langB.value : langA.value;
    const srcTA    = sourceSide === "a" ? textA : textB;
    const dstTA    = sourceSide === "a" ? textB : textA;
    const dots     = sourceSide === "a" ? dotsB : dotsA;
    const text     = srcTA.value.trim();

    if (!text) { dstTA.value = ""; return; }

    dots.classList.add("visible");
    dstTA.value = "";

    try {
      const res  = await fetch(BACKEND_URL + "/translate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, from_lang: fromLang, to_lang: toLang })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      dstTA.value = data.translation;
      if (autoSpeak) speakText(data.translation, toLang);
    } catch(e) {
      dstTA.value = "Translation failed — check connection.";
    }
    dots.classList.remove("visible");
  }

  // ── Typing debounce (800ms) ───────────────────────────────────────
  function setupTyping(ta, side) {
    ta.addEventListener("input", () => {
      clearTimeout(typingTimer);
      const other = side === "a" ? textB : textA;
      if (!ta.value.trim()) { other.value = ""; return; }
      typingTimer = setTimeout(() => triggerTranslate(side), 1800);
    });
  }
  setupTyping(textA, "a");
  setupTyping(textB, "b");

  // ── TTS ───────────────────────────────────────────────────────────
  if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = () => {};

  function getBestVoice(locale) {
    const voices = speechSynthesis.getVoices();
    const lang = locale.split("-")[0];
    return voices.find(v => v.lang === locale && v.localService)
        || voices.find(v => v.lang === locale)
        || voices.find(v => v.lang.startsWith(lang) && v.localService)
        || voices.find(v => v.lang.startsWith(lang))
        || null;
  }
  function checkVoice(locale) {
    const voices = speechSynthesis.getVoices();
    const lang = locale.split("-")[0];
    return voices.some(v => v.lang === locale || v.lang.startsWith(lang));
  }
  function speakText(text, langCode) {
    if (!text) return;
    speechSynthesis.cancel();
    const locale = TTS_LOCALE[langCode] || "en-US";
    if (!checkVoice(locale)) {
      voiceHelp.style.display = "block";
      return;
    }
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = locale;
    const v = getBestVoice(locale);
    if (v) utt.voice = v;
    utt.rate = 0.88;
    speechSynthesis.speak(utt);
  }

  speakABtn.addEventListener("click", () => speakText(textA.value, langA.value));
  speakBBtn.addEventListener("click", () => speakText(textB.value, langB.value));
  document.getElementById("voice-help-close").addEventListener("click", () => { voiceHelp.style.display = "none"; });

  // ── Microphone ────────────────────────────────────────────────────
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  function startMic(side) {
    if (!SR) { alert("Microphone not supported in this browser. Please use Chrome."); return; }
    if (activeSide) { stopMic(); return; }

    activeSide = side;
    const btn      = side === "a" ? micABtn : micBBtn;
    const otherBtn = side === "a" ? micBBtn : micABtn;
    const lang     = side === "a" ? langA.value : langB.value;
    const ta       = side === "a" ? textA : textB;

    recognition = new SR();
    recognition.lang = TTS_LOCALE[lang] || "en-US";
    recognition.continuous = false;
    recognition.interimResults = true;

    let finalText = "";

    recognition.onstart = () => {
      btn.classList.add("listening");
      otherBtn.disabled = true;
    };
    recognition.onresult = e => {
      finalText = "";
      let interim = "";
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      ta.value = finalText || interim;
    };
    recognition.onend = () => {
      btn.classList.remove("listening");
      otherBtn.disabled = false;
      activeSide = null; recognition = null;
      if (finalText.trim()) { ta.value = finalText.trim(); triggerTranslate(side); }
    };
    recognition.onerror = e => {
      btn.classList.remove("listening");
      otherBtn.disabled = false;
      activeSide = null; recognition = null;
    };
    recognition.start();
  }

  function stopMic() { if (recognition) recognition.stop(); }

  micABtn.addEventListener("click", () => activeSide === "a" ? stopMic() : startMic("a"));
  micBBtn.addEventListener("click", () => activeSide === "b" ? stopMic() : startMic("b"));

  // ── PWA ───────────────────────────────────────────────────────────
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
  if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone) {
    document.getElementById("install-hint").textContent = 'Tap Share → "Add to Home Screen" to install';
  }
</script>
</body>
</html>
